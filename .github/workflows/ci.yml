name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ottibull
          POSTGRES_PASSWORD: ottibull
          POSTGRES_DB: ottibull
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ottibull -d ottibull"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://ottibull:ottibull@localhost:5432/ottibull
      AUTH_SECRET: ci-secret-32-bytes-ci-secret-32xx
      AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      EMAIL_FROM: noreply@example.com
      OWNER_EMAIL: owner@example.com
      OWNER_WHATSAPP: "34666123456"
      RESEND_API_KEY: ""
      BLOB_READ_WRITE_TOKEN: ""

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec drizzle-kit migrate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install chromium --with-deps
      - run: |
          # seed admin user for the admin E2E specs
          pnpm tsx scripts/seed-admin.ts --email=admin@ottibull.com --password=changemetoo --name=Admin
          # seed FAQs so /faq tests don't see empty state
          pnpm tsx scripts/seed-faqs.ts
      - run: pnpm test:e2e
